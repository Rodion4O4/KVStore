version: '3.8'

services:
  kvstore:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - kvstore_data:/root/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  kvstore_data:
